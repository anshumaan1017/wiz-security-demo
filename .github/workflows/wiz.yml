name: "Wiz Container Security Scan"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  wiz-scan:
    name: "Wiz Container Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    env:
      IMAGE_TAG: "wiz-security-demo:${{ github.sha }}"
      POLICY: "Zee-Container-Security"

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t "$IMAGE_TAG" .

      # ── SCAN — produces SARIF (for upload) + JSON (for noise filtering) ────
      - name: Wiz Container Scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          curl -fsSL -o /tmp/wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x /tmp/wizcli
          sudo /tmp/wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

          sudo -E /tmp/wizcli docker scan \
            --image "$IMAGE_TAG" \
            --policies "$POLICY" \
            --output image.sarif,sarif,vulnerabilities \
            --output wiz_results.json,json,vulnerabilities \
            --output image.txt,human,vulnerabilities || true

          sudo chown runner:runner image.sarif wiz_results.json image.txt 2>/dev/null || true
          cat image.txt 2>/dev/null || true

      # ── FILTER — reduce SARIF from ~2600 → ~259 (exploit + fix available) ─
      - name: Filter SARIF (Exploit + Fix only)
        if: always() && hashFiles('wiz_results.json') != ''
        run: |
          python3 << 'PY'
          import json, sys

          # Load Wiz vulnerability JSON
          wiz = json.load(open('wiz_results.json'))
          result = wiz.get('result', {})

          # Collect CVE IDs that pass the filter:
          #   osPackages + libraries only, hasExploit=true, fixedVersion available
          keep = set()
          all_count = 0
          for pkg_type in ['osPackages', 'libraries']:
              for pkg in (result.get(pkg_type, []) or []):
                  for v in (pkg.get('vulnerabilities', []) or []):
                      all_count += 1
                      if v.get('hasExploit') and v.get('fixedVersion') not in (None, ''):
                          keep.add(v.get('name', ''))

          print(f"Total Wiz vulns (osPackages+libraries): {all_count}")
          print(f"After filter (exploit + fix):           {len(keep)}")
          print(f"Noise removed:                         {all_count - len(keep)} ({100*(all_count-len(keep))/max(all_count,1):.1f}%)")

          # Rewrite image.sarif keeping only filtered CVEs
          sarif = json.load(open('image.sarif'))
          for run in sarif.get('runs', []):
              original = run.get('results', [])
              run['results'] = [r for r in original if r.get('ruleId', '') in keep]
              # Clean up rules list to only referenced rules
              used = {r.get('ruleId', '') for r in run['results']}
              driver = run.get('tool', {}).get('driver', {})
              if 'rules' in driver:
                  driver['rules'] = [r for r in driver['rules'] if r.get('id', '') in used]
              filtered_count = len(run['results'])
              print(f"SARIF results: {len(original)} → {filtered_count}")

          json.dump(sarif, open('image.sarif', 'w'))
          print("image.sarif updated with filtered results")
          PY

      # ── PARSE — enrich SARIF + generate job summary ───────────────────────
      - name: Parse & Enrich SARIF
        if: always()
        shell: pwsh
        run: |
          ./scripts/parse_wiz_image_scan.ps1 `
            -ImageSarifPath      image.sarif `
            -SummaryMarkdownPath wiz-summary.md

      - name: Publish Job Summary
        if: always()
        run: |
          [ -f wiz-summary.md ] && cat wiz-summary.md >> "$GITHUB_STEP_SUMMARY" || true

      # ── UPLOAD SARIF (filtered ~259 findings) ─────────────────────────────
      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: image.sarif
          category: wiz-image

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            image.sarif
            wiz_results.json
            image.txt
            wiz-summary.md
