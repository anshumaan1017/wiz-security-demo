name: "Prisma vs Wiz — Comparison Scan"

on:
  workflow_dispatch:

jobs:
  compare:
    name: "Prisma vs Wiz"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      IMAGE_TAG: "wiz-security-demo:${{ github.sha }}"
      POLICY: "Zee-Container-Security"

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t "$IMAGE_TAG" .

      # ── PRISMA SCAN ────────────────────────────────────────────────────────
      - name: Prisma Scan
        continue-on-error: true
        env:
          PCC_USER: ${{ secrets.PCC_USER }}
          PCC_PASS: ${{ secrets.PCC_PASS }}
        run: |
          PCC="https://asia-south1.cloud.twistlock.com/india-1131963775"
          curl -fsSL -u "$PCC_USER:$PCC_PASS" -o /tmp/twistcli "$PCC/api/v1/util/twistcli"
          chmod +x /tmp/twistcli

          /tmp/twistcli images scan \
            --address "$PCC" --user "$PCC_USER" --password "$PCC_PASS" \
            --output-file prisma_results.json --details \
            "$IMAGE_TAG" || true

          python3 << 'PY' | tee /tmp/prisma_stats.txt
          import json
          d = json.load(open('prisma_results.json'))
          vulns = d.get('results',[{}])[0].get('vulnerabilities',[])
          sevs = {}
          for v in vulns:
              s = v.get('severity','unknown').lower()
              sevs[s] = sevs.get(s, 0) + 1
          print(f"TOTAL={len(vulns)}")
          for s in ['critical','high','medium','low']:
              print(f"{s.upper()}={sevs.get(s,0)}")
          PY

      # ── WIZ SCAN ──────────────────────────────────────────────────────────
      - name: Wiz Scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          curl -fsSL -o /tmp/wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x /tmp/wizcli
          sudo /tmp/wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

          sudo -E /tmp/wizcli docker scan \
            --image "$IMAGE_TAG" \
            --policies "$POLICY" \
            --output wiz_results.json,json,vulnerabilities || true

          sudo chown runner:runner wiz_results.json 2>/dev/null || true

          python3 << 'PY' | tee /tmp/wiz_stats.txt
          import json
          d = json.load(open('wiz_results.json'))
          result = d.get('result', {})

          cats = {}
          for pkg_type in ['osPackages','libraries','applications','cpes','endOfLifeTechnologies']:
              cat_vulns = []
              for pkg in (result.get(pkg_type, []) or []):
                  for v in (pkg.get('vulnerabilities', []) or []):
                      v['_src'] = pkg_type
                      cat_vulns.append(v)
              cats[pkg_type] = cat_vulns

          all_vulns = [v for vs in cats.values() for v in vs]
          cs_lib = [v for v in all_vulns if v['_src'] in ('osPackages','libraries')]
          cs_lib_exploit = [v for v in cs_lib if v.get('hasExploit')]
          cs_lib_exploit_fix = [v for v in cs_lib_exploit if v.get('fixedVersion') not in (None, '')]

          print(f"RAW_ALL={len(all_vulns)}")
          print(f"CS_LIB={len(cs_lib)}")
          print(f"CS_LIB_EXPLOIT={len(cs_lib_exploit)}")
          print(f"CS_LIB_EXPLOIT_FIX={len(cs_lib_exploit_fix)}")

          sevs = {}
          for v in cs_lib_exploit_fix:
              s = v.get('severity','UNKNOWN').upper()
              sevs[s] = sevs.get(s, 0) + 1
          print(f"TOTAL={len(cs_lib_exploit_fix)}")
          for s in ['CRITICAL','HIGH','MEDIUM','LOW']:
              print(f"{s}={sevs.get(s,0)}")
          print(f"OS_PKG={len([v for v in cs_lib_exploit_fix if v['_src']=='osPackages'])}")
          print(f"LIB_PKG={len([v for v in cs_lib_exploit_fix if v['_src']=='libraries'])}")
          PY

      # ── COMPARISON SUMMARY ─────────────────────────────────────────────────
      - name: Comparison Summary
        if: always()
        run: |
          P_TOTAL=0; P_CRIT=0; P_HIGH=0; P_MED=0; P_LOW=0
          [ -f /tmp/prisma_stats.txt ] && while IFS='=' read -r k v; do
            case "$k" in TOTAL) P_TOTAL=$v;; CRITICAL) P_CRIT=$v;; HIGH) P_HIGH=$v;; MEDIUM) P_MED=$v;; LOW) P_LOW=$v;; esac
          done < /tmp/prisma_stats.txt

          W_TOTAL=0; W_CRIT=0; W_HIGH=0; W_MED=0; W_LOW=0
          W_RAW=0; W_CSLIB=0; W_CSLIB_EXP=0; W_CSLIB_EXP_FIX=0; W_OS=0; W_LIB=0
          [ -f /tmp/wiz_stats.txt ] && while IFS='=' read -r k v; do
            case "$k" in
              TOTAL) W_TOTAL=$v;; CRITICAL) W_CRIT=$v;; HIGH) W_HIGH=$v;; MEDIUM) W_MED=$v;; LOW) W_LOW=$v;;
              RAW_ALL) W_RAW=$v;; CS_LIB) W_CSLIB=$v;; CS_LIB_EXPLOIT) W_CSLIB_EXP=$v;;
              CS_LIB_EXPLOIT_FIX) W_CSLIB_EXP_FIX=$v;; OS_PKG) W_OS=$v;; LIB_PKG) W_LIB=$v;;
            esac
          done < /tmp/wiz_stats.txt

          REMOVED=$((W_RAW - W_TOTAL))
          PCT=$(python3 -c "print(f'{100*${REMOVED}/${W_RAW}:.1f}')" 2>/dev/null || echo "n/a")

          {
            echo "# Prisma vs Wiz — Container Scan Comparison"
            echo ""
            echo "**Image:** \`$IMAGE_TAG\`  |  **Wiz Policy:** \`$POLICY\`"
            echo ""
            echo "## Wiz Noise Reduction (Progressive Filtering)"
            echo ""
            echo "| Filter Stage | CVEs | Reduction |"
            echo "|---|---:|---:|"
            echo "| Raw Wiz scan (all) | $W_RAW | — |"
            echo "| osPackages + libraries only | $W_CSLIB | −$((W_RAW - W_CSLIB)) |"
            echo "| + Public exploit (\`hasExploit\`) | $W_CSLIB_EXP | −$((W_CSLIB - W_CSLIB_EXP)) |"
            echo "| + Fix available (\`fixedVersion\`) | $W_CSLIB_EXP_FIX | −$((W_CSLIB_EXP - W_CSLIB_EXP_FIX)) |"
            echo "| **Noise removed** | **$REMOVED** | **${PCT}%** |"
            echo ""
            echo "## Final Comparison"
            echo ""
            echo "| Severity | Prisma Cloud (all) | Wiz (filtered) |"
            echo "|---|---:|---:|"
            echo "| 🔴 Critical | $P_CRIT | $W_CRIT |"
            echo "| 🟠 High | $P_HIGH | $W_HIGH |"
            echo "| 🟡 Medium | $P_MED | $W_MED |"
            echo "| 🟢 Low | $P_LOW | $W_LOW |"
            echo "| **Total** | **$P_TOTAL** | **$W_TOTAL** |"
            echo ""
            echo "> **Wiz filters:** osPackages + libraries → hasExploit=true → fixedVersion available"
            echo "> **Wiz breakdown:** OS Packages: $W_OS | Libraries: $W_LIB"
            echo ""
            echo "_Run: $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            prisma_results.json
            wiz_results.json
